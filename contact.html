<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Dayo Peters</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">DayoPortfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Academic Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="card contact-form-wrapper">
            <h2>Get In Touch</h2>
            <p id="formFeedback" class="feedback-msg"></p>
            
            <form id="contactForm" onsubmit="validateContactForm(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="emailAddress">Email Address</label>
                    <input type="text" id="emailAddress" placeholder="example@miva.edu.ng">
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="text" id="phoneNumber" placeholder="08012345678">
                </div>
                <div class="form-group">
                    <label for="message">Message Details</label>
                    <textarea id="message" rows="5" placeholder="Write your message content here..."></textarea>
                </div>
                <button type="submit" class="btn block-btn">Submit Verification Link</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MIVA Open University. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
